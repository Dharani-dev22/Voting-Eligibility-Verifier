<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Voting Eligibility Verifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" onchange="toggleTheme()" />
            <div class="slider round"></div>
        </label>
        <em>Dark Mode</em>
    </div>

    <div class="container">
        <h1>Voting Eligibility Checker</h1>
        <p>Verify your age, citizenship, and registration status.</p>
        
        <div class="input-group">
            <div class="field-group">
                <label for="dobInput">Date of Birth:</label>
                <input type="date" id="dobInput" required>
            </div>
            
            <label class="checkbox-container">
                <input type="checkbox" id="citizenCheck">
                I am a citizen of this country
            </label>

            <div class="field-group">
                <label for="voterIdStatus">Voter ID Status:</label>
                <select id="voterIdStatus">
                    <option value="has_id">I have a valid Voter ID</option>
                    <option value="needs_id">I need to apply for a Voter ID</option>
                </select>
            </div>

            <button onclick="checkEligibility()">Verify Eligibility</button>
        </div>
        
        <div id="resultMessage" class="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
